<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Price Products Monitor - UAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800" x-data="dashboard()">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="md:flex md:items-center md:justify-between mb-8">
            <div class="flex-1 min-w-0">
                <h2 class="text-2xl font-bold leading-7 text-gray-900 sm:text-3xl sm:truncate">
                    Zero Price Product Monitor 🚨
                </h2>
                <p class="mt-1 text-sm text-gray-500">
                    Live monitoring of UAT Algolia Index (twd_cds_th_products) for items with price=0 or final_price=0.
                </p>
            </div>
            <div class="mt-4 flex md:mt-0 md:ml-4 gap-3">
                <div class="flex items-center text-sm font-medium text-gray-500 bg-white px-4 py-2 rounded-md shadow-sm border border-gray-200">
                    <span class="mr-2">Total Issues:</span>
                    <span x-text="totalHits" class="text-red-600 font-bold text-lg">0</span>
                </div>
                <button @click="fetchProducts(0)" class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    <i class="fas fa-sync-alt mr-2" :class="{'animate-spin': loading}"></i> Refresh
                </button>
            </div>
        </div>

        <!-- Error State -->
        <div x-show="error" class="rounded-md bg-red-50 p-4 mb-6" style="display: none;">
            <div class="flex">
                <div class="flex-shrink-0">
                    <i class="fas fa-exclamation-circle text-red-400"></i>
                </div>
                <div class="ml-3">
                    <h3 class="text-sm font-medium text-red-800">Error fetching data</h3>
                    <div class="mt-2 text-sm text-red-700" x-text="error"></div>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="mb-4">
            <div class="relative rounded-md shadow-sm max-w-md">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-search text-gray-400"></i>
                </div>
                <input type="text" x-model="searchQuery" class="focus:ring-indigo-500 focus:border-indigo-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-md py-2 border" placeholder="Search SKU locally...">
            </div>
        </div>
        <div class="flex flex-col">
            <div class="-my-2 overflow-x-auto sm:-mx-6 lg:-mx-8">
                <div class="py-2 align-middle inline-block min-w-full sm:px-6 lg:px-8">
                    <div class="shadow overflow-hidden border-b border-gray-200 sm:rounded-lg bg-white">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Product</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">SKU</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Brand</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Categories</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Prices</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
                                <template x-if="loading && products.length === 0">
                                    <tr>
                                        <td colspan="6" class="px-6 py-10 text-center text-gray-500">
                                            <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                                            <p>Loading products from Algolia...</p>
                                        </td>
                                    </tr>
                                </template>
                                <template x-if="!loading && products.length === 0">
                                    <tr>
                                        <td colspan="6" class="px-6 py-10 text-center text-gray-500">
                                            <i class="fas fa-check-circle text-green-500 text-3xl mb-2"></i>
                                            <p class="text-lg font-medium text-gray-900">All Good!</p>
                                            <p>No products found with a price of 0.</p>
                                        </td>
                                    </tr>
                                </template>
                                <template x-for="product in filteredProducts" :key="product.objectID">
                                    <tr class="hover:bg-gray-50 transition-colors duration-150">
                                        <td class="px-6 py-4 whitespace-nowrap">
                                            <div class="flex items-center">
                                                <div class="flex-shrink-0 h-10 w-10">
                                                    <img class="h-10 w-10 rounded-md object-cover bg-gray-100 border border-gray-200" 
                                                         :src="product.image_url ? 'https://uat-gcp-assets.central.co.th/' + product.image_url : 'https://via.placeholder.com/40?text=No+Img'" 
                                                         alt=""
                                                         @error="$el.src='https://via.placeholder.com/40?text=Error'">
                                                </div>
                                                <div class="ml-4">
                                                    <div class="text-sm font-medium text-gray-900 max-w-xs truncate" x-text="product.name || 'Unknown Name'" :title="product.name"></div>
                                                    <div class="text-sm text-gray-500" x-text="'Object ID: ' + product.objectID"></div>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="px-6 py-4 whitespace-nowrap">
                                            <div class="text-sm text-gray-900 font-mono" x-text="product.sku"></div>
                                        </td>
                                        <td class="px-6 py-4 whitespace-nowrap">
                                            <div class="text-sm text-gray-900" x-text="product.brand_name || '-'"></div>
                                        </td>
                                        <td class="px-6 py-4">
                                            <div class="text-sm text-gray-500 max-w-xs truncate" :title="(product.categories_without_path || []).join(', ')">
                                                <span x-text="(product.categories_without_path || []).slice(0, 2).join(', ')"></span>
                                                <span x-show="(product.categories_without_path || []).length > 2">...</span>
                                            </div>
                                        </td>
                                        <td class="px-6 py-4 whitespace-nowrap">
                                            <div class="text-sm text-red-600 font-bold" x-text="'Price: ฿' + product.price"></div>
                                            <div class="text-sm text-red-500 font-bold" x-text="'Final: ฿' + product.final_price"></div>
                                        </td>
                                        <td class="px-6 py-4 whitespace-nowrap">
                                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full" 
                                                  :class="product.stock?.is_in_stock ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'"
                                                  x-text="product.stock?.is_in_stock ? 'In Stock' : 'Out of Stock'">
                                            </span>
                                            <span class="ml-1 px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800" x-text="product.seller">
                                            </span>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Pagination -->
        <div class="bg-white px-4 py-3 flex items-center justify-between border-t border-gray-200 sm:px-6 mt-4 rounded-md shadow-sm" x-show="nbPages > 1" style="display: none;">
            <div class="flex-1 flex justify-between sm:hidden">
                <button @click="fetchProducts(currentPage - 1)" :disabled="currentPage === 0" class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50">
                    Previous
                </button>
                <button @click="fetchProducts(currentPage + 1)" :disabled="currentPage >= nbPages - 1" class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50">
                    Next
                </button>
            </div>
            <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
                <div>
                    <p class="text-sm text-gray-700">
                        Showing page <span class="font-medium" x-text="currentPage + 1"></span> of <span class="font-medium" x-text="nbPages"></span>
                    </p>
                </div>
                <div>
                    <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                        <button @click="fetchProducts(currentPage - 1)" :disabled="currentPage === 0" class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50">
                            <span class="sr-only">Previous</span>
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <button @click="fetchProducts(currentPage + 1)" :disabled="currentPage >= nbPages - 1" class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50">
                            <span class="sr-only">Next</span>
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <script>
        function dashboard() {
            return {
                products: [],
                searchQuery: '',
                get filteredProducts() {
                    if (this.searchQuery === '') {
                        return this.products;
                    }
                    const lowerCaseQuery = this.searchQuery.toLowerCase();
                    return this.products.filter(product => {
                        return product.sku && product.sku.toLowerCase().includes(lowerCaseQuery);
                    });
                },
                loading: false,
                error: null,
                totalHits: 0,
                currentPage: 0,
                nbPages: 0,
                hitsPerPage: 50,

                init() {
                    this.fetchProducts(0);
                },

                async fetchProducts(page) {
                    if (page < 0 || (this.nbPages > 0 && page >= this.nbPages)) return;
                    
                    this.loading = true;
                    this.error = null;
                    
                    try {
                        const response = await fetch(`/api/products?page=${page}&hitsPerPage=${this.hitsPerPage}`);

                        if (!response.ok) {
                            throw new Error(`API returned status: ${response.status}`);
                        }

                        const data = await response.json();
                        this.products = data.hits || [];
                        this.totalHits = data.nbHits || 0;
                        this.currentPage = data.page || 0;
                        this.nbPages = data.nbPages || 0;
                    } catch (err) {
                        this.error = err.message || 'Failed to fetch data from the server';
                        console.error('Fetch error:', err);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
